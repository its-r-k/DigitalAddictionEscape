# .github/workflows/build-apk.yml
#
# Digital Addiction: The Rogue-lite Escape — APK Build Pipeline
#
# Triggers:
#   • Every push to `main`
#   • Every pull request targeting `main`
#   • Manual trigger via "Run workflow" button in GitHub Actions UI
#
# Outputs:
#   • debug-apk artifact — available for 14 days after each run
#
# ─────────────────────────────────────────────────────────────────

name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout source code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 (required by AGP 8.x) ──────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle        # caches ~/.gradle between runs

      # ── 3. Copy web game assets into Android assets directory ────
      #    Assumes the HTML/CSS/JS files live at /game/assets/ in
      #    the repo root. Adjust the source path if different.
      - name: Copy web game assets into Android project
        run: |
          mkdir -p app/src/main/assets
          cp game/assets/index.html app/src/main/assets/
          cp game/assets/styles.css app/src/main/assets/
          cp game/assets/game.js    app/src/main/assets/

      # ── 4. Make Gradle wrapper executable ───────────────────────
      - name: Grant Gradle wrapper execute permission
        run: chmod +x ./gradlew

      # ── 5. Build the debug APK ───────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. Upload APK as a downloadable artifact ─────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
